name: Sync Python Scripts to S3

on:
  push:
    branches:
      - main
    paths:
      - 'src/**/*.py'
  workflow_dispatch:  # Allow manual triggering

jobs:
  sync-to-s3:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2
      
      - name: Sync Python scripts to S3
        run: |
          echo "Syncing Python scripts to S3..."
          aws s3 sync src/ s3://landregistryproject/scripts/ \
            --exclude "*" \
            --include "*.py" \
            --delete
          
          echo "✓ Scripts synced successfully"
          
          # List uploaded files for verification
          echo ""
          echo "Files in S3:"
          aws s3 ls s3://landregistryproject/scripts/ --recursive
      
      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Python scripts synced to S3" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Location:** \`s3://landregistryproject/scripts/\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Synced Files:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          aws s3 ls s3://landregistryproject/scripts/ --recursive >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

